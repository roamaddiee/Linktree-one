<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linki — Magdalena Dura</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0a0f14;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* Matrix Rain Background */
        #matrixCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .container {
            position: relative;
            display: flex;
            gap: 0;
            align-items: center;
            z-index: 2;
        }

        .card {
            position: relative;
            background: rgba(20, 25, 30, 0.7);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            width: 520px;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.2);
            border: 1px solid rgba(74, 222, 128, 0.2);
        }

        h1 {
            margin: 0 0 20px 0;
            font-size: 28px;
            line-height: 1.2;
            color: #4ade80;
            text-align: left;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.08);
            margin: 12px 0;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            font-size: 18px;
            transition: 0.25s ease;
            font-weight: 600;
        }

        .btn:hover {
            background: rgba(74, 222, 128, 0.25);
            transform: translateX(6px);
            box-shadow: 0 4px 12px rgba(74, 222, 128, 0.2);
        }

        .btn svg {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
        }

        .avatar-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
            flex-shrink: 0;
            margin-left: -150px;
            margin-bottom: 20px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(74, 222, 128, 0.3));
        }

        .eyes-container {
            position: absolute;
            top: 34%;
            left: 44%;
            transform: translateX(-50%);
            width: 75px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 100;
        }

        .eye:first-child {
            margin-right: 0;
        }

        .eye:last-child {
            margin-left: 15px;
        }

        .eye {
            width: 25px;
            height: 25px;
            background: white;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            border: 2px solid #2d3748;
        }

        .pupil {
            width: 20px;
            height: 20px;
            background: #1a202c;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.1s ease;
        }

        .pupil::after {
            content: '';
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 4px;
            left: 4px;
            opacity: 0.8;
        }

        .copyright {
            margin-top: 24px;
            font-size: 14px;
            color: #4ade80;
            text-align: left;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                gap: 20px;
            }
            
            .card {
                width: 90%;
                max-width: 350px;
            }
            
            h1 {
                text-align: center;
            }
            
            .copyright {
                text-align: center;
            }
            
            .avatar-wrapper {
                width: 240px;
                height: 240px;
                margin-left: 0;
                margin-bottom: 0;
            }

            .eyes-container {
                width: 56px;
            }

            .eye {
                width: 19px;
                height: 19px;
            }

            .pupil {
                width: 15px;
                height: 15px;
            }

            .pupil::after {
                width: 6px;
                height: 6px;
            }
        }
    </style>
</head>

<body>
    <!-- Matrix Canvas Background -->
    <canvas id="matrixCanvas"></canvas>

    <div class="container">
        <div class="card">
            <h1>Cześć! To moje linki</h1>

            <a class="btn" href="https://instagram.com/twoj_instagram" target="_blank" rel="noopener noreferrer">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden>
                    <path d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V7a5 5 0 0 1 5-5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="12" cy="12" r="3" fill="currentColor"/>
                </svg>
                Instagram
            </a>
            <a class="btn" href="https://linkedin.com/in/twoj_profil" target="_blank" rel="noopener noreferrer">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden>
                    <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <rect x="2" y="9" width="4" height="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="4" cy="4" r="2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                LinkedIn
            </a>
            <a class="btn" href="https://twojeportfolio.pl" target="_blank" rel="noopener noreferrer">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden>
                    <path d="M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M12 8v4l2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Portfolio
            </a>
            <a class="btn" href="https://buymeacoffee.com/twoj_profil" target="_blank" rel="noopener noreferrer">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden>
                    <path d="M18 8h1a4 4 0 0 1 0 8h-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M6 1v3m4-3v3m4-3v3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Kawka
            </a>

            <div class="copyright">© Magdalena Dura — 2025</div>
        </div>

        <!-- Avatar with animated eyes -->
        <div class="avatar-wrapper">
            <img src="avatar.png" alt="Avatar" class="avatar">
            
            <!-- Animated Eyes -->
            <div class="eyes-container">
                <div class="eye">
                    <div class="pupil" id="leftPupil"></div>
                </div>
                <div class="eye">
                    <div class="pupil" id="rightPupil"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Matrix Rain Animation
        (function() {
            const canvas = document.getElementById('matrixCanvas');
            const ctx = canvas.getContext('2d');

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$#@%&*()_+-=[]{}|;:,.<>?/~`';
            const fontSize = 14;
            const columns = Math.floor(canvas.width / fontSize);
            const drops = [];

            for (let i = 0; i < columns; i++) {
                drops[i] = Math.random() * -100;
            }

            function draw() {
                ctx.fillStyle = 'rgba(10, 15, 20, 0.05)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#4ade80';
                ctx.font = `${fontSize}px monospace`;

                for (let i = 0; i < drops.length; i++) {
                    const text = chars.charAt(Math.floor(Math.random() * chars.length));
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                        drops[i] = 0;
                    }
                    drops[i]++;
                }
            }

            const isTouchDevice = ('ontouchstart' in window || navigator.maxTouchPoints > 0);
            setInterval(draw, isTouchDevice ? 60 : 40);
        })();

        // Eye Tracking Animation
        (function() {
            const leftPupil = document.getElementById('leftPupil');
            const rightPupil = document.getElementById('rightPupil');
            
            if (!leftPupil || !rightPupil) {
                console.log('Pupils not found!');
                return;
            }
            
            document.addEventListener('mousemove', (e) => {
                movePupil(leftPupil, e);
                movePupil(rightPupil, e);
            });
            
            function movePupil(pupil, e) {
                const eye = pupil.parentElement;
                const eyeRect = eye.getBoundingClientRect();
                const eyeCenterX = eyeRect.left + eyeRect.width / 2;
                const eyeCenterY = eyeRect.top + eyeRect.height / 2;
                
                const angle = Math.atan2(e.clientY - eyeCenterY, e.clientX - eyeCenterX);
                const distance = Math.min(12, Math.hypot(e.clientX - eyeCenterX, e.clientY - eyeCenterY) / 30);
                
                const pupilX = Math.cos(angle) * distance;
                const pupilY = Math.sin(angle) * distance;
                
                pupil.style.transform = `translate(calc(-50% + ${pupilX}px), calc(-50% + ${pupilY}px))`;
            }
        })();
    </script>
</body>
</html>
